<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        form {
            padding: 20px;
            border: 1px solid #ccc;
            width: 300px;
            border-radius: 8px;
        }
        input[type="text"] {
            width: 95%;
            padding: 8px;
            margin-bottom: 10px;
        }
        input[type="submit"] {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <form>
        <label>Enter Your Name:</label><br>
        <input type="text" placeholder="Your name"><br>
        <input type="submit" value="Submit">
    </form>

</body>
</html>
