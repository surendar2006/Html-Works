<!DOCTYPE html>
<html>
<head>
    <title>Greeting Alert</title>
</head>
<body>

    <button onclick="showGreeting()">Show Greeting</button>

    <script>
        function showGreeting() {
            let hour = new Date().getHours();
            let message = "";

            if (hour < 12) {
                message = "Good morning!";
            } else if (hour < 18) {
                message = "Good afternoon!";
            } else {
                message = "Good evening!";
            }

            alert(message);
        }
    </script>

</body>
</html>
