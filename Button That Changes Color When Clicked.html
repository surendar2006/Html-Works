<!DOCTYPE html>
<html>
<head>
    <title>Button Color Change</title>
    <style>
        #colorBtn {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="colorBtn" onclick="changeColor()">Click Me</button>

    <script>
        function changeColor() {
            const btn = document.getElementById("colorBtn");
            btn.style.backgroundColor = 
                btn.style.backgroundColor === "blue" ? "green" : "blue";
        }
    </script>

</body>
</html>
