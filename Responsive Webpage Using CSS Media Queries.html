<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
            background: #f2f2f2;
            padding: 20px;
            border-radius: 8px;
        }

        h1 {
            font-size: 32px;
        }

        p {
            font-size: 18px;
        }


        @media (max-width: 768px) {
            h1 { font-size: 28px; }
            p { font-size: 16px; }
            .container { width: 90%; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 24px; text-align: center; }
            p { font-size: 14px; text-align: center; }
            .container { width: 100%; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Responsive Design Example</h1>
        <p>This text and layout adjust based on screen size using CSS media queries.</p>
    </div>

</body>
</html>
